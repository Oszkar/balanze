name: release

on:
  # Manual-only: a maintainer supplies an existing release tag explicitly,
  # reviews both platform builds, and publishes the draft. Automatic
  # tag-triggered publication stays disabled because the mac leg needs its
  # notarization to be eyeballed and the per-OS validation matrix
  # (AGENTS.md §6) is not fully covered by the per-PR gate.
  #
  # Build matrix note: there are TWO matrices here and they ship different
  # architecture sets. The desktop `build` job builds aarch64-apple-darwin
  # (Intel macOS is excluded - see docs/PRD.md "Supported platforms") and
  # host-default x86_64-pc-windows-msvc. The `cli` job builds those two plus
  # aarch64-pc-windows-msvc and x86_64-unknown-linux-musl. deny.toml's
  # [graph].targets carries the UNION of the two, not either one alone.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (must match v*.*.*, e.g. v0.4.4)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  notes:
    # Single source of the release-notes prose. A step's `with:` block cannot be
    # shared conditionally, so before this job the same paragraphs were pasted
    # into both desktop legs and kept in sync by hand (DRY, AGENTS.md §2).
    # Runs first so an ill-formed tag fails before any build starts.
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.read.outputs.body }}
    steps:
      - name: Validate tag input
        # Reject anything that isn't v*.*.* - a manual dispatch from a feature
        # branch or `main` would otherwise draft a release named
        # "Balanze main" with `github.ref_name`. Forcing the tag to be supplied
        # AND well-formed is the only sane gate for a manual-only workflow.
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag input '$TAG' must match v*.*.* (e.g. v0.4.4)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Read the release body
        id: read
        shell: bash
        run: |
          set -euo pipefail
          {
            echo 'body<<RELEASE_BODY_EOF'
            cat .github/release-body.md
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    needs: notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Rust toolchain
        # Pin (channel + components) comes from rust-toolchain.toml - see ci.yml.
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
          cache: false
          rustflags: ""

      - name: Cache Rust workspace
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple Developer certificate
        # Codesigning identity for macOS - see AGENTS.md §3.4 (secrets surface)
        # and docs/ARCHITECTURE.md. Without a stable "Developer ID Application"
        # signature, macOS Keychain "Always Allow" grants can't persist across
        # rebuilds (issue #160). Runner is ephemeral, so the temp keychain and
        # decoded cert never outlive the job.
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          # Only needs to be internally consistent for this job - the keychain
          # is unlocked for the rest of the run (set-keychain-settings -t 3600
          # -u below), so no later step ever needs this value again. No reason
          # to persist it as a secret.
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm "$CERT_PATH"
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$CERT_ID" ]; then
            echo "::error::no 'Developer ID Application' identity found in the imported certificate"
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        # Notarization credential (App Store Connect API key path, not the
        # Apple ID + app-specific-password flow) - see AGENTS.md §3.4.
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build & release (macOS)
        # A step's env: block has no per-key `if:` - splitting macOS out of
        # the shared step (rather than gating individual env keys) is the
        # only way to keep the Apple secrets out of the Windows leg's
        # process environment entirely (PoLP, AGENTS.md §3.4).
        #
        # APPLE_SIGNING_IDENTITY and APPLE_API_KEY_PATH are already in the
        # job's process environment via $GITHUB_ENV (written by the two
        # steps above) - GitHub Actions propagates those to every later
        # step automatically, so re-mapping them here would be a no-op.
        # APPLE_CERTIFICATE/APPLE_CERTIFICATE_PASSWORD are deliberately not
        # passed to tauri-action: their presence triggers its own built-in
        # certificate-import/keychain setup, which would create a second
        # keychain alongside the one we already imported into and unlocked
        # by hand above.
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Balanze ${{ inputs.tag }}'
          releaseBody: ${{ needs.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build & release (Windows)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Balanze ${{ inputs.tag }}'
          releaseBody: ${{ needs.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Publish SHA-256 checksums
        # Trust substitute for the unsigned Windows installers, and a plain
        # integrity check on macOS: a user can confirm a download is
        # byte-for-byte what CI built. This is the thing the README offers in
        # place of a code-signing certificate (docs/PRD.md "Code signing"), so
        # a failure here is a release blocker, not a nicety.
        #
        # One file per leg (not one shared file) - the two legs race, and
        # `gh release upload --clobber` on a shared name would drop whichever
        # finished first.
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          # Workspace-root target/, not src-tauri/target/: src-tauri is a
          # member of the root workspace (Cargo.toml `members`), so cargo puts
          # its artifacts in the shared target dir.
          BUNDLE_DIR: ${{ matrix.platform == 'macos-latest' && 'target/aarch64-apple-darwin/release/bundle' || 'target/release/bundle' }}
          LEG: ${{ matrix.platform == 'macos-latest' && 'macos-aarch64' || 'windows-x64' }}
        run: |
          set -euo pipefail
          # macOS runners ship BSD shasum, not coreutils' sha256sum; Git Bash
          # on the Windows runner ships sha256sum.
          if command -v sha256sum >/dev/null 2>&1; then
            HASH=(sha256sum)
          else
            HASH=(shasum -a 256)
          fi
          # Workspace-relative on purpose: $RUNNER_TEMP is a backslash path on
          # the Windows leg, which Git Bash mangles (docs/TROUBLESHOOTING.md).
          OUT="${LEG}-checksums.txt"
          : > "$OUT"
          # Hash from each file's own directory so the recorded name is the
          # bare asset name a user downloads, not a CI-internal path. The
          # redirect sits outside the subshell deliberately: the parent shell
          # resolves the relative $OUT against the workspace root, before the
          # `cd` takes effect.
          # No `sort -z` on the find pipeline - BSD sort lacks it; sort the
          # finished file by filename instead.
          while IFS= read -r -d '' f; do
            ( cd "$(dirname "$f")" && "${HASH[@]}" "$(basename "$f")" ) >> "$OUT"
          done < <(find "$BUNDLE_DIR" -type f \
            \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.msi' -o -name '*-setup.exe' \) \
            -print0)
          if [ ! -s "$OUT" ]; then
            echo "::error::no release artifacts found under $BUNDLE_DIR - checksums would ship empty"
            exit 1
          fi
          sort -k2 -o "$OUT" "$OUT"
          cat "$OUT"
          gh release upload "$TAG" "$OUT" --clobber

      - name: Clean up macOS signing material
        if: always() && matrix.platform == 'macos-latest'
        run: |
          security delete-keychain build.keychain || true
          rm -f "$RUNNER_TEMP/AuthKey.p8"

  cli:
    # Prebuilt `balanze-cli` binaries. `needs: build` because the desktop legs
    # are what create the draft release; `gh release upload` needs it to exist.
    # This matrix plus `build`'s matrix together define the shipped
    # architectures, which deny.toml's [graph].targets must match as a union
    # (AGENTS.md §1).
    # Note: `build` reports failure if EITHER matrix leg fails, so a single
    # flaky notarization skips this job entirely even though the surviving leg
    # already created the draft. Re-run the failed jobs; every upload uses
    # --clobber, so re-running is safe and idempotent.
    needs: build
    name: cli (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - platform: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install musl toolchain
        # ring is the CLI's only non-Rust dependency (reqwest runs on rustls, no
        # OpenSSL), and it needs a C compiler targeting musl. Static musl is
        # deliberate: a glibc binary built here would link this runner's glibc
        # and refuse to run on older distros.
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        # Pin (channel + components) comes from rust-toolchain.toml - see ci.yml.
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: false
          rustflags: ""

      - name: Cache Rust workspace
        # save-if: false because this workflow only runs on tag refs. Actions
        # cache scopes are per-ref with fallback to the default branch only,
        # which release.yml never populates - so a restore here always misses
        # and a save would cost four legs' worth of upload for a scope nothing
        # ever reads. The restore attempt is kept in case that changes.
        uses: swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
          save-if: false

      - name: Build balanze-cli
        run: cargo build --release --locked --package balanze_cli --target ${{ matrix.target }}

      - name: Package, checksum, and upload
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          NAME="balanze-cli-${TAG}-${TARGET}"
          mkdir -p "dist/${NAME}"
          if [ "$ARCHIVE" = "zip" ]; then
            cp "target/${TARGET}/release/balanze-cli.exe" "dist/${NAME}/"
          else
            cp "target/${TARGET}/release/balanze-cli" "dist/${NAME}/"
          fi
          cp LICENSE "dist/${NAME}/"

          cd dist
          if [ "$ARCHIVE" = "zip" ]; then
            ASSET="${NAME}.zip"
            7z a -tzip "$ASSET" "$NAME" > /dev/null
          else
            ASSET="${NAME}.tar.gz"
            tar -czf "$ASSET" "$NAME"
          fi

          # macOS runners ship BSD shasum, not coreutils' sha256sum; Git Bash on
          # the Windows runner ships sha256sum. Same idiom as the desktop legs'
          # checksum step.
          if command -v sha256sum > /dev/null 2>&1; then
            HASH=(sha256sum)
          else
            HASH=(shasum -a 256)
          fi
          "${HASH[@]}" "$ASSET" > "${ASSET}.sha256"
          cat "${ASSET}.sha256"

          # One sibling .sha256 per archive rather than a shared checksum file:
          # the four legs race, and `--clobber` on a shared name would drop
          # whichever finished first. Homebrew also wants exactly one hash per
          # URL, which this gives it directly.
          gh release upload "$TAG" "$ASSET" "${ASSET}.sha256" --clobber

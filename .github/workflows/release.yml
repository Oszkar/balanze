name: release

on:
  # Manual-only until v0.4 (Distribution). v0.1–v0.3 ship from source
  # (`cargo install --git … balanze_cli`) — no binaries, no GitHub Releases
  # (see README "Install" / docs/prd.md phasing). The `push: tags` auto-trigger
  # is intentionally NOT enabled yet: it would build/publish the src-tauri
  # *scaffold* (placeholder, not the CLI deliverable) on every vX.Y.Z tag.
  # Re-add the tag trigger at v0.4 when signed binaries are real:
  #   push:
  #     tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust workspace
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Balanze ${{ github.ref_name }}'
          releaseBody: |
            Auto-generated release. Unsigned binaries.
            - Windows users: SmartScreen will warn on first run; click "More info" → "Run anyway".
            - macOS users: Gatekeeper will warn; right-click the app → "Open" the first time.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

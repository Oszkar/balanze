name: release

on:
  # Manual-only while release artifacts are unsigned drafts. A maintainer
  # supplies an existing release tag explicitly, reviews both platform builds,
  # and publishes the draft. Automatic tag-triggered publication stays disabled
  # until the signing and notarization policy is committed.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (must match v*.*.*, e.g. v0.4.4)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Validate tag input
        # Reject anything that isn't v*.*.* - a manual dispatch from a feature
        # branch or `main` would otherwise draft a release named
        # "Balanze main" with `github.ref_name`. Forcing the tag to be supplied
        # AND well-formed is the only sane gate for a manual-only workflow.
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag input '$TAG' must match v*.*.* (e.g. v0.4.4)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Rust toolchain
        # Pin (channel + components) comes from rust-toolchain.toml - see ci.yml.
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
          cache: false
          rustflags: ""

      - name: Cache Rust workspace
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Balanze ${{ inputs.tag }}'
          releaseBody: |
            Auto-generated release. Unsigned binaries.
            - Windows users: SmartScreen will warn on first run; click "More info" → "Run anyway".
            - macOS users: Gatekeeper will warn; right-click the app → "Open" the first time.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

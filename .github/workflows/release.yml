name: release

on:
  # Manual-only while release artifacts are unsigned drafts. A maintainer
  # supplies an existing release tag explicitly, reviews both platform builds,
  # and publishes the draft. Automatic tag-triggered publication stays disabled
  # until the signing and notarization policy is committed.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (must match v*.*.*, e.g. v0.4.4)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Validate tag input
        # Reject anything that isn't v*.*.* - a manual dispatch from a feature
        # branch or `main` would otherwise draft a release named
        # "Balanze main" with `github.ref_name`. Forcing the tag to be supplied
        # AND well-formed is the only sane gate for a manual-only workflow.
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag input '$TAG' must match v*.*.* (e.g. v0.4.4)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Rust toolchain
        # Pin (channel + components) comes from rust-toolchain.toml - see ci.yml.
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
          cache: false
          rustflags: ""

      - name: Cache Rust workspace
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple Developer certificate
        # Codesigning identity for macOS - see AGENTS.md §3.4 (secrets surface)
        # and docs/ARCHITECTURE.md. Without a stable "Developer ID Application"
        # signature, macOS Keychain "Always Allow" grants can't persist across
        # rebuilds (issue #160). Runner is ephemeral, so the temp keychain and
        # decoded cert never outlive the job.
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm "$CERT_PATH"
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$CERT_ID" ]; then
            echo "::error::no 'Developer ID Application' identity found in the imported certificate"
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        # Notarization credential (App Store Connect API key path, not the
        # Apple ID + app-specific-password flow) - see AGENTS.md §3.4.
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build & release (macOS)
        # A step's env: block has no per-key `if:` - splitting macOS out of
        # the shared step (rather than gating individual env keys) is the
        # only way to keep the Apple secrets out of the Windows leg's
        # process environment entirely (PoLP, AGENTS.md §3.4).
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Balanze ${{ inputs.tag }}'
          releaseBody: |
            Auto-generated release.
            - Windows users: unsigned - SmartScreen will warn on first run; click "More info" → "Run anyway".
            - macOS users: signed and notarized - Gatekeeper should not warn.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build & release (Windows)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Balanze ${{ inputs.tag }}'
          releaseBody: |
            Auto-generated release.
            - Windows users: unsigned - SmartScreen will warn on first run; click "More info" → "Run anyway".
            - macOS users: signed and notarized - Gatekeeper should not warn.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Clean up macOS signing material
        if: always() && matrix.platform == 'macos-latest'
        run: |
          security delete-keychain build.keychain || true
          rm -f "$RUNNER_TEMP/AuthKey.p8"

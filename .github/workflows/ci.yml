name: ci

# Strategy:
# - `linux` runs on every push + PR - the always-on gate covering rustfmt,
#   clippy, tests, and svelte-check for the workspace MINUS src-tauri (which
#   needs GTK+webkit deps we don't apt-install for the fast path).
# - `cross-platform` runs the full workspace tests + a full-workspace clippy
#   pass on Windows + macOS, on a weekly schedule and on demand. rustfmt and
#   svelte-check don't need re-running here - they're truly OS-agnostic.
#   The clippy pass covers the whole workspace (not just src-tauri) because
#   `#[cfg(target_os = ...)]` branches elsewhere (keychain, watcher, parser
#   walkers) are compiled out on Linux and so go unlinted by the `linux` job -
#   this is the only job that ever lints them for real.
#   What this catches: Tauri's per-OS compilation paths, Windows file-
#   system quirks (mtime resolution affecting IncrementalParser), macOS
#   keychain, and lint violations in any other OS-gated code path. None of
#   that changes between most commits, so paying for it every PR was
#   over-budget for current value.
# - Before tagging a release, hit "Run workflow" in the Actions UI to fire
#   `cross-platform` against the commit you're about to tag. The release.yml
#   workflow also matrix-builds at tag time, so you have two layers of
#   pre-release validation.
# - `deny` is fast (~30s) and platform-agnostic - always on.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 04:00 UTC. Aligned with Dependabot so weekly noise lands in one
    # window. Schedule events only fire on the default branch.
    - cron: "0 4 * * 1"
  workflow_dispatch:
    # Manual fire-button. Use before tagging / when touching platform-sensitive
    # code (watcher, keychain, src-tauri).

jobs:
  linux:
    name: linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Rust toolchain
        # Reads the pin (channel + components) from rust-toolchain.toml, so
        # that file is the single source of truth and dependabot stops
        # proposing toolchain releases as action-tag bumps. cache/rustflags
        # are off: swatinem/rust-cache below owns caching, and the action's
        # default RUSTFLAGS=-Dwarnings would change build/test behavior.
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Cache Rust workspace
        uses: swatinem/rust-cache@v2
        with:
          # PR runs read the cache but don't write it back - only main pushes
          # update the shared cache, so unrelated PRs don't trample each
          # other's caches.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (workspace minus src-tauri)
        # src-tauri pulls in webkit2gtk/libgtk-3 on Linux; rather than
        # apt-install those just to lint scaffold tray code, defer src-tauri
        # lint to the cross-platform job where the right Tauri toolchain is
        # present natively.
        run: cargo clippy --workspace --exclude balanze --all-targets -- -D warnings

      - name: cargo nextest (workspace minus src-tauri)
        # No separate doc-test step: the workspace has zero doctests today.
        # If doctests appear, add `cargo test --doc --workspace` here
        # (nextest doesn't run doctests).
        run: cargo nextest run --workspace --exclude balanze

      - name: svelte-check
        run: bun run check

  cross-platform:
    name: cross-platform
    # Only fires on the weekly schedule + manual dispatch. NOT on PR or push,
    # so day-to-day feedback comes from `linux`.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Rust toolchain
        # Same setup as `linux` above: pin comes from rust-toolchain.toml.
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Cache Rust workspace
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri -> target
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: cargo nextest (full workspace, including src-tauri)
        run: cargo nextest run --workspace

      - name: clippy (full workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace

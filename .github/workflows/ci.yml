name: ci

# Strategy:
# - `linux` runs on every push + PR — the always-on gate covering rustfmt,
#   clippy, tests, and svelte-check for the workspace MINUS src-tauri (which
#   needs GTK+webkit deps we don't apt-install for the fast path).
# - `cross-platform` runs the full workspace tests + a clippy pass on
#   src-tauri (the one crate Linux can't lint without GTK/webkit deps)
#   on Windows + macOS, on a weekly schedule and on demand. rustfmt and
#   svelte-check don't need re-running here — they're truly OS-agnostic.
#   What this catches: Tauri's per-OS compilation paths, Windows file-
#   system quirks (mtime resolution affecting IncrementalParser), macOS
#   keychain. None of that changes between most commits, so paying for it
#   every PR was over-budget for current value.
# - Before tagging a release, hit "Run workflow" in the Actions UI to fire
#   `cross-platform` against the commit you're about to tag. The release.yml
#   workflow also matrix-builds at tag time, so you have two layers of
#   pre-release validation.
# - `deny` is fast (~30s) and platform-agnostic — always on.
# - `pr-title` validates the PR title against Conventional Commits (PRs only) —
#   the server-side backstop for the local `commit-msg` hook, since squash-merge
#   lands the PR title as the commit subject on `main`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 04:00 UTC. Aligned with Dependabot so weekly noise lands in one
    # window. Schedule events only fire on the default branch.
    - cron: "0 4 * * 1"
  workflow_dispatch:
    # Manual fire-button. Use before tagging / when touching platform-sensitive
    # code (watcher, keychain, src-tauri).

jobs:
  linux:
    name: linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust workspace
        uses: swatinem/rust-cache@v2
        with:
          # PR runs read the cache but don't write it back — only main pushes
          # update the shared cache, so unrelated PRs don't trample each
          # other's caches.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (workspace minus src-tauri)
        # src-tauri pulls in webkit2gtk/libgtk-3 on Linux; rather than
        # apt-install those just to lint scaffold tray code, defer src-tauri
        # lint to the cross-platform job where the right Tauri toolchain is
        # present natively.
        run: cargo clippy --workspace --exclude balanze --all-targets -- -D warnings

      - name: cargo test (workspace minus src-tauri)
        run: cargo test --workspace --exclude balanze

      - name: svelte-check
        run: bun run check

  cross-platform:
    name: cross-platform
    # Only fires on the weekly schedule + manual dispatch. NOT on PR or push,
    # so day-to-day feedback comes from `linux`.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust workspace
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri -> target
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: cargo test (full workspace, including src-tauri)
        run: cargo test --workspace

      - name: clippy src-tauri
        run: cargo clippy -p balanze --all-targets -- -D warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace

  pr-title:
    name: pr-title
    # Squash-merge lands the PR title as the commit subject on `main`, so it must
    # match the same Conventional Commits grammar the local `commit-msg` hook
    # enforces (.lefthook/commit-msg/conventional.sh) — this is the server-side
    # backstop for a `--no-verify` push. Only meaningful on PRs (push / schedule
    # / dispatch have no PR title), so it's gated to `pull_request`.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        # PR title passed via env (not inline `${{ }}`) so a crafted title can't
        # inject shell. Regex mirrors conventional.sh exactly.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf 'PR title: %s\n' "$PR_TITLE"
          if printf '%s' "$PR_TITLE" | grep -qE '^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([^)]+\))?!?: .+'; then
            echo "OK: matches Conventional Commits."
          else
            {
              echo "::error::PR title is not Conventional Commits (squash-merge lands it on main)."
              echo "  Format: <type>(optional-scope)(!)?: <subject>"
              echo "  Types:  feat fix chore docs style refactor perf test build ci revert"
              echo "  Got:    $PR_TITLE"
            } >&2
            exit 1
          fi

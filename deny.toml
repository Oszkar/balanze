# cargo-deny configuration.
# https://embarkstudios.github.io/cargo-deny/
#
# Four guard rails enforced in CI on every PR + push to main:
# - advisories: RustSec database (CVEs, unsoundness, yanked crates)
# - licenses:   only allow OSI-blessed licenses we're comfortable with
# - bans:       no wildcard version reqs; multiple-version skew warned
# - sources:    only crates.io; no random git deps
#
# Run locally:   cargo install --locked cargo-deny && cargo deny check

[graph]
# By default cargo-deny only checks the host platform. This list is the UNION of
# the two build matrices in release.yml: the desktop legs (Windows x64, macOS
# arm64) and the CLI legs (those two plus Windows arm64 and Linux musl).
# Targeting only what we actually build keeps the dep graph honest.
#
# This list must track release.yml's build matrices exactly. Intel macOS
# (x86_64-apple-darwin) is deliberately absent: the release workflow builds
# aarch64-apple-darwin only, so vetting an Intel dep graph would fail CI on
# advisories that cannot reach a user. See docs/PRD.md "Supported platforms".
#
# The Linux triple is here for the CLI, which is pure Rust plus rustls. It also
# drags src-tauri's Linux dependency path (GTK3 via Tauri) into the graph even
# though no Linux desktop build is ever produced. No ignore entries were needed
# for that: `unmaintained = "workspace"` below already scopes unmaintained
# advisories to workspace members, and the gtk-rs family is transitive through
# tauri -> tray-icon -> webkit2gtk/wry.
#
# That scoping covers the unmaintained category ONLY. The Linux triple did widen
# the graph for vulnerability, unsound, yanked, licenses, and bans, which all
# pass today. If a real vulnerability ever lands in the GTK3 chain it will block
# cargo-deny for a path that is never shipped - ignore that advisory here with a
# note saying src-tauri is not built for Linux, rather than dropping the triple
# (the CLI genuinely ships there).
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-pc-windows-msvc" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-unknown-linux-musl" },
]

# --- Security advisories (RustSec) ----------------------------------------

[advisories]
version = 2
yanked = "warn"
# Specific RUSTSEC IDs to ignore - leave empty until something actually
# justifies it; record the reason inline when adding.
# RUSTSEC-2026-0194 and RUSTSEC-2026-0195: quick-xml <0.41 is pulled
# transitively through Tauri 2.11.5 by plist 1.9.0 and
# tauri-winrt-notification 0.7.2. There is no crates.io upgrade path yet
# because plist requires quick-xml ^0.39.2 and tauri-winrt-notification
# requires quick-xml ^0.37. Balanze does not parse untrusted XML through
# these paths; remove once upstream Tauri deps can take quick-xml >=0.41.0.
ignore = ["RUSTSEC-2026-0194", "RUSTSEC-2026-0195"]
# Only check WORKSPACE crates for unmaintained status. Transitive
# unmaintained crates (e.g., Unicode helpers Tauri pulls in via Windows
# Webview2 deps) aren't actionable from this repo - Dependabot tracks
# upstream advisories for us. Tighten to "all" once we have direct
# control over the dep graph.
unmaintained = "workspace"

# --- License policy --------------------------------------------------------

[licenses]
version = 2
# Permissive licenses we accept. SPDX identifiers.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "0BSD",
    # CDLA-Permissive-2.0 is used by `webpki-roots` (Mozilla's CA bundle),
    # which reqwest+rustls pull in transitively. It's a permissive
    # community-data license; OSI hasn't approved it but FSF rates it as
    # similar to Apache-2.0 for use. Accepting because the alternative
    # (drop rustls TLS) is unreasonable.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
# Per-crate exceptions for crates whose license file is hard to detect
# automatically (cargo-deny's heuristics can miss). Add with a reason.
exceptions = []

# --- Banned crates / version skew -----------------------------------------

[bans]
# Two copies of the same crate at different versions sometimes happen in
# Rust ecosystems (transitive deps lag); warn rather than deny so we can
# triage in CI without blocking merges. Tighten to "deny" once the
# baseline is clean.
multiple-versions = "warn"
# Wildcard version requirements (`*`) are a footgun for external deps but
# unavoidable for intra-workspace `path = "../foo"` dependencies - those
# appear as wildcards in Cargo.lock because they have no version
# constraint. Allow them; deny external wildcards.
wildcards = "deny"
allow-wildcard-paths = true
deny = []
# Crates allowed to appear in multiple versions without a warning.
skip = []

# --- Source registries -----------------------------------------------------

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
